<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarageOnline - Tienda de Vehículos</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="hero">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
<i class="fas fa-car"></i> GarageOnline
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="#inicio">Inicio</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#vehiculos">Vehículos</a>
</li>

</ul>

<input class="form-control me-3" id="searchInput" placeholder="Buscar vehículo">

<button class="btn btn-outline-light position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">

<i class="fas fa-shopping-cart"></i>

<span id="cartCount" class="badge bg-danger position-absolute top-0 start-100 translate-middle">0</span>

</button>

</div>
</div>
</nav>

</header>


<main class="container mt-5 pt-5">

<section id="inicio" class="text-center my-5">

<h1>Bienvenido a GarageOnline</h1>

<p>La mejor tienda digital para comprar vehículos.</p>

</section>


<section id="vehiculos">

<h2 class="text-center mb-4">Nuestros Vehículos</h2>

<div id="loadingSpinner" class="text-center">

<div class="spinner-border text-primary"></div>

</div>

<div class="row" id="productsContainer"></div>

</section>

</main>


<footer class="bg-dark text-white text-center p-3 mt-5">

© 2026 GarageOnline

</footer>


<div class="modal fade" id="quantityModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Cantidad</h5>
</div>

<div class="modal-body">

<input type="number" id="quantityInput" class="form-control" min="1" value="1">

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

<button class="btn btn-primary" id="addToCartBtn">Añadir al carrito</button>

</div>

</div>

</div>

</div>


<div class="modal fade" id="cartModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">
<h5>Carrito</h5>
</div>

<div class="modal-body">

<div id="cartItems"></div>

<h4>Total: $<span id="cartTotal">0</span></h4>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Seguir viendo
</button>

<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#paymentModal">
Pagar
</button>

</div>

</div>

</div>

</div>


<div class="modal fade" id="paymentModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Pago</h5>
</div>

<div class="modal-body">

<input class="form-control mb-2" placeholder="Nombre">

<input class="form-control mb-2" placeholder="Tarjeta">

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

<button class="btn btn-primary" id="processPaymentBtn">
Procesar Pago
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
